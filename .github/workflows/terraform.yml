name: Terraform

on:
  push:
    branches:
      - main
      - terraform-sharing-db
  pull_request:
    branches:
      - main
      - terraform-sharing-db

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Debug GitHub Context
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Actor: ${{ github.actor }}"
          echo "Ref: ${{ github.ref }}"
          echo "Event Name: ${{ github.event_name }}"

      - name: Get OIDC Token Details
        id: get_token
        run: |
          # Get the token and extract claims
          TOKEN_RESPONSE=$(curl -sS -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com")
          echo "Full Response:"
          echo "$TOKEN_RESPONSE" | jq '.'
          
          # Try to extract specific claims if they exist
          echo "Attempting to extract sub claim:"
          echo "$TOKEN_RESPONSE" | jq -r '.sub // empty'
          
          echo "Attempting to extract aud claim:"
          echo "$TOKEN_RESPONSE" | jq -r '.aud // empty'
        env:
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ secrets.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
          ACTIONS_ID_TOKEN_REQUEST_URL: ${{ secrets.ACTIONS_ID_TOKEN_REQUEST_URL }}

      - name: Verify AWS Role
        run: |
          echo "Attempting to assume role: ${{ env.AWS_ROLE_ARN }}"
          echo "Using audience: sts.amazonaws.com"
        env:
          AWS_ROLE_ARN: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role-shared

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role-shared
          aws-region: ${{ secrets.AWS_REGION }}
          audience: sts.amazonaws.com